# Ablation config: fno_1step explicit autoregressive baseline.
# @package _global_
defaults:
  - /config          # inherit base config (data, train defaults)
  - /model: model_fno
  - _self_

train:
  warmup_steps: 4
  rollout_steps: 16
  learning_rate: 5.0e-4
  window_stride: 4
  grad_checkpoint: false
  lambda_prior: 0.0
  lambda_cons:  0.0
  lambda_spec:  0.01
  lambda_highk: 0.0
  scheduled_sampling:
    start_prob: 1.0
    end_prob: 0.0
